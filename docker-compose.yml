services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: cicddb
      POSTGRES_USER: cicd
      POSTGRES_PASSWORD: cicdpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      FLASK_APP: webapp.py
      FLASK_ENV: development
    depends_on:
      - mongo
    volumes:
      - ./uploads:/app/uploads

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      MONGO_URI: mongodb://mongo:27017/cicd_app
      MONGODB_URI: mongodb://mongo:27017/cicd_app
      PORT: "3000"
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_REPO_OWNER: ${GITHUB_REPO_OWNER:-}
      GITHUB_REPO_NAME: ${GITHUB_REPO_NAME:-}
      WORKFLOW_FILE: ${WORKFLOW_FILE:-ci.yml}
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: /api
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mongo_data:
  postgres_data:
